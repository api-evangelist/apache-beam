name: Apache Beam
description: Apache Beam is a unified programming model for defining both batch and
  streaming data processing pipelines that can run on multiple execution engines.
  It provides a portable API that lets developers write pipeline logic once and deploy
  it to Apache Flink, Spark, Google Dataflow, or other supported runners.
